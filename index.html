<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#e8a0bf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Liste Naissance - Bebe 2</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icone.svg">
<link rel="icon" type="image/svg+xml" href="icone.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf6f0;color:#333;min-height:100vh;overflow:hidden}
header{background:linear-gradient(135deg,#e8a0bf,#f3c6d8);color:white;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
header h1{font-size:1.15rem;font-weight:700}
.header-btns{display:flex;gap:6px}
.hbtn{background:rgba(255,255,255,0.25);border:none;color:white;border-radius:20px;padding:6px 12px;font-size:1.1rem;cursor:pointer}
.search-wrap{position:sticky;top:52px;z-index:9;background:#fdf6f0;padding:10px 16px}
.search{display:flex;gap:8px;align-items:center}
.search input{flex:1;background:white;border:2px solid #e8a0bf;border-radius:25px;padding:14px 18px;font-size:1.15rem;outline:none}
.search button{background:#e8a0bf;color:white;border:none;border-radius:25px;padding:14px 20px;font-size:1.3rem;cursor:pointer;font-weight:700}
.link-mode{display:flex;gap:8px;align-items:center;background:white;border:2px solid #e8a0bf;border-radius:25px;padding:14px 18px;flex:1}
.link-mode input{flex:1;border:none;outline:none;font-size:1rem}
.link-mode .go{background:#e8a0bf;color:white;border:none;border-radius:20px;padding:10px 16px;cursor:pointer;font-weight:700}
.tabs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;background:#fdf6f0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:white;border:1.5px solid #e8a0bf;border-radius:20px;padding:6px 14px;font-size:0.8rem;white-space:nowrap;cursor:pointer;color:#e8a0bf}
.tab.active{background:#e8a0bf;color:white}
.list{flex:1;overflow-y:auto;padding:8px 16px 80px}
.item{background:white;border-radius:14px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.item input[type=checkbox]{width:22px;height:22px;accent-color:#e8a0bf;cursor:pointer;flex-shrink:0}
.item-info{flex:1}
.item-info .nom{font-weight:700;font-size:1.05rem}
.item-info .nom.barre{text-decoration:line-through;color:#aaa}
.item-info .meta{font-size:0.78rem;color:#999;margin-top:2px}
.item-info .lien a{font-size:0.78rem;color:#e8a0bf;word-break:break-all}
.badge{font-size:0.7rem;padding:3px 8px;border-radius:10px;background:#fde8f0;color:#b05a7a;white-space:nowrap}
.btn-del{background:none;border:none;color:#ddd;font-size:1.2rem;cursor:pointer;padding:4px}
.btn-del:hover{color:#e00}
.btn-edit{background:none;border:none;color:#aaa;font-size:1rem;cursor:pointer;padding:4px}
.empty{text-align:center;color:#bbb;padding:50px 20px;font-size:1rem}
.fab{position:fixed;bottom:24px;right:24px;background:#e8a0bf;color:white;border:none;border-radius:50%;width:60px;height:60px;font-size:2rem;cursor:pointer;box-shadow:0 4px 16px rgba(232,160,191,0.5);z-index:100}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;justify-content:center;align-items:flex-end}
.overlay.open{display:flex}
.modal{display:none;background:white;border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.2rem;color:#b05a7a;margin-bottom:16px}
.modal label{font-size:0.8rem;color:#888;margin-bottom:4px;display:block}
.modal input,.modal select{width:100%;padding:12px 14px;border:1.5px solid #eee;border-radius:12px;font-size:1rem;outline:none;font-family:inherit;margin-bottom:14px}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.modal-btns button{flex:1;padding:14px;border-radius:25px;border:none;font-size:1rem;cursor:pointer}
.btn-ok{background:#e8a0bf;color:white;font-weight:700}
.btn-cancel{background:#f5f5f5;color:#888}
.btn-danger{background:#e74c3c;color:white;font-weight:700}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:12px;margin-bottom:8px}
.cat-item input{flex:1;border:1.5px solid #eee;border-radius:8px;padding:8px 12px;font-size:1rem}
.cat-item .del{background:none;border:none;color:#e74c3c;font-size:1.2rem;cursor:pointer}
.add-cat{display:flex;gap:8px;margin-top:8px}
.add-cat input{flex:1;border:1.5px solid #eee;border-radius:8px;padding:8px 12px;font-size:1rem}
.add-cat button{background:#e8a0bf;color:white;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-weight:700}
.extract-info{background:#f0f8ff;border:1px solid #b0c4de;border-radius:12px;padding:12px;margin-bottom:14px}
.extract-info h3{font-size:0.85rem;color:#2c5aa0;margin-bottom:8px}
.extract-info p{font-size:0.85rem;color:#333;margin:4px 0}
.loading{font-size:0.85rem;color:#e8a0bf;font-style:italic}
body.dark{background:#1a1a2e;color:#eee}
body.dark header{background:linear-gradient(135deg,#b05a7a,#8b405a)}
body.dark .search-wrap,body.dark .tabs{background:#1a1a2e}
body.dark .search input,body.dark .link-mode{background:#16213e;color:#eee;border-color:#444}
body.dark .search button,body.dark .link-mode .go{background:#b05a7a}
body.dark .tab{background:#16213e;border-color:#444;color:#aaa}
body.dark .tab.active{background:#b05a7a;border-color:#b05a7a;color:white}
body.dark .item{background:#16213e}
body.dark .item-info .meta{color:#777}
body.dark .modal{background:#1a1a2e}
body.dark .modal input,body.dark .modal select,body.dark .cat-item input,body.dark .add-cat input{background:#16213e;color:#eee;border-color:#444}
body.dark .btn-cancel{background:#16213e;color:#aaa}
body.dark .extract-info{background:#16213e;border-color:#444}
body.dark .extract-info h3{color:#e8a0bf}
@media(min-width:600px){.overlay{align-items:center}.modal{border-radius:24px}.search-wrap,.tabs,.list{max-width:640px;margin:0 auto}}
</style>
</head><body>
<header>
<h1>👶 Liste Naissance - Bebe 2</h1>
<div class="header-btns">
<button class="hbtn" onclick="toggleTheme()" title="Theme">🌙</button>
<button class="hbtn" onclick="ouvrirCat()" title="Categories">⚙</button>
<button class="hbtn" onclick="partager()" title="Partager">🔗</button>
</div>
</header>
<div class="search-wrap">
<div id="search-mode" class="search">
<input type="text" id="input" placeholder="Tape et appuie sur Entree..." onkeydown="if(event.key==='Enter')ajoutRapide()" autofocus>
<button onclick="ouvrirModal()" title="Ajout detaille">+</button>
<button onclick="toggleLinkMode()" title="Ajouter par lien">🔗</button>
</div>
<div id="link-mode" class="link-mode" style="display:none">
<input type="url" id="lienInput" placeholder="Colle le lien du produit (Amazon, Cdiscount...)">
<button class="go" onclick="extraireLien()">Go</button>
<button onclick="toggleLinkMode()">✕</button>
</div>
</div>
<div id="tabs" class="tabs"></div>
<div id="liste" class="list"></div>
<div id="extract-result" class="list" style="display:none"></div>
<button class="fab" onclick="ouvrirModal()">+</button>
<div class="overlay" id="overlay" onclick="fermerModal()"></div>
<div class="modal" id="modal-ajout" onclick="event.stopPropagation()">
<h2>Ajout detaille</h2>
<label>Nom *</label><input type="text" id="mNom" placeholder="Article...">
<label>Categorie</label><select id="mCat"></select>
<label>Lien produit</label><input type="url" id="mLien" placeholder="URL...">
<label>Prix</label><input type="text" id="mPrix" placeholder="ex: 49€">
<label>Note</label><input type="text" id="mNote" placeholder="ex: taille 3 mois">
<div class="modal-btns">
<button class="btn-cancel" onclick="fermerModal()">Annuler</button>
<button class="btn-ok" onclick="ajoutDetail()">Ajouter ✓</button>
</div>
</div>
<div class="modal" id="modal-edit" onclick="event.stopPropagation()">
<h2>Modifier l'article</h2>
<label>Nom *</label><input type="text" id="eNom" placeholder="Article...">
<label>Categorie</label><select id="eCat"></select>
<label>Lien produit</label><input type="url" id="eLien" placeholder="URL...">
<label>Prix</label><input type="text" id="ePrix" placeholder="ex: 49€">
<label>Note</label><input type="text" id="eNote" placeholder="ex: taille 3 mois">
<div class="modal-btns">
<button class="btn-cancel" onclick="fermerModal()">Annuler</button>
<button class="btn-ok" onclick="sauvegarderModif()">Enregistrer ✓</button>
</div>
</div>
<div class="modal" id="modal-cat" onclick="event.stopPropagation()">
<h2>Gestion des categories</h2>
<div id="cat-list"></div>
<div class="add-cat">
<input type="text" id="newCat" placeholder="Nouvelle categorie...">
<button onclick="ajouterCategorie()">+</button>
</div>
<div class="modal-btns">
<button class="btn-ok" onclick="fermerModal()">Fermer</button>
</div>
</div>

  <script>const $=id=>document.getElementById(id);const db={items:[],cats:[],loaded:false,editId:null,quickText:''};const catsKey='liste_cats',itemsKey='liste_items';
function save(){localStorage.setItem(catsKey,JSON.stringify(db.cats));localStorage.setItem(itemsKey,JSON.stringify(db.items));}function load(){try{db.cats=JSON.parse(localStorage.getItem(catsKey))||['Vêtements','Puériculture','Jeux','Chambre','Hygiène','Repas'];}catch(e){}try{db.items=JSON.parse(localStorage.getItem(itemsKey))||[];}catch(e){}}
window.addEventListener('load',()=>{load();renderCats();renderList();renderTabs();if('serviceWorker'in navigator){navigator.serviceWorker.register('/liste-naissance-bebe2/sw.js').catch(e=>console.log('SW error:',e));}});
function renderCats(){const ct=$('tabs');ct.innerHTML='';db.cats.forEach((c,i)=>{const btn=document.createElement('button');btn.className='tab'+(i===0?' active':'');btn.textContent=c;btn.onclick=()=>switchCat(i);ct.appendChild(btn);});}function renderList(){const list=$('liste');list.innerHTML='';const c=db.cats[0];const items=db.items.filter(it=>it.cat===c);items.forEach(it=>{const div=document.createElement('div');div.className='item';const ck=document.createElement('input');ck.type='checkbox';ck.checked=it.done;ck.onchange=()=>{it.done=ck.checked;save();};div.appendChild(ck);const info=document.createElement('div');info.className='item-info';const title=document.createElement('div');title.textContent=it.name;info.appendChild(title);if(it.url){const url=document.createElement('a');url.href=it.url;url.textContent='lien';url.target='_blank';info.appendChild(url);}if(it.prix){const p=document.createElement('span');p.className='meta';p.textContent='Prix: '+it.prix;info.appendChild(p);}if(it.note){const n=document.createElement('span');n.className='meta';n.textContent=it.note;info.appendChild(n);}div.appendChild(info);const del=document.createElement('button');del.textContent='✕';del.onclick=()=>{db.items=db.items.filter(x=>x!==it);save();renderList();};div.appendChild(del);list.appendChild(div);});}function renderTabs(){const ts=$('tabs');const catIndex=db.cats.indexOf(db.items[0]?.cat||db.cats[0]);ts.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===catIndex);});}function switchCat(i){renderList();}function ouvrirModal(){const m=$('modal-ajout');m.style.display='block';$('overlay').classList.add('open');}function fermerModal(){const m=$('modal-ajout');m.style.display='none';$('overlay').classList.remove('open');}function ajoutDetail(){const name=$('mNom')?.value||'';const url=$('mLien')?.value||'';const prix=$('mPrix')?.value||'';const note=$('mNote')?.value||'';if(!name)return;const catIndex=0;const cat=db.cats[catIndex];db.items.push({id:Date.now(),name,cat,url,prix,note,done:false});save();renderList();fermerModal();$('mNom').value='';$('mLien').value='';$('mPrix').value='';$('mNote').value='';}function toggleLinkMode(){const lm=$('link-mode');lm.style.display=lm.style.display==='none'?'flex':'none';}function extraireLien(){const url=$('lienInput')?.value;if(!url)return;const extractInfo=$('extract-info');extractInfo.innerHTML='<div class="loading">Extraction...</div>';fetch('https://cors-anywhere.herokuapp.com/'+url).then(r=>r.text()).then(html=>{const parser=new DOMParser();const doc=parser.parseFromString(html,'text/html');const title=doc.querySelector('title')?.textContent||'Produit';const desc=doc.querySelector('meta[name="description"]')?.content||'';let prix='';const priceMatch=html.match(/[0-9]+[.,][0-9]{2}[€$]/);if(priceMatch)prix=priceMatch[0];extractInfo.innerHTML='<div class="extract-info"><h3>'+title+'</h3><p>'+desc+'</p>'+(prix?'<p>Prix: '+prix+'</p>':'')+'</div>';$('mNom').value=title;$('mPrix').value=prix;}).catch(e=>{extractInfo.innerHTML='<p class="loading">Erreur: '+e.message+'</p>'});}function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');}function partager(){alert('Fonctionnalité partageà implanter');}if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');</script></body></html>
