<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="theme-color" content="#e8a0bf"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>Liste Naissance - Bebe 2</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icone.svg"><link rel="icon" type="image/svg+xml" href="icone.svg"><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf6f0;color:#333;min-height:100vh;overflow:hidden}header{background:linear-gradient(135deg,#e8a0bf,#f3c6d8);color:white;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}header h1{font-size:1.15rem;font-weight:700}.header-btns{display:flex;gap:6px}.hbtn{background:rgba(255,255,255,0.25);border:none;color:white;border-radius:20px;padding:6px 12px;font-size:1.1rem;cursor:pointer}.search-wrap{position:sticky;top:52px;z-index:9;background:#fdf6f0;padding:10px 16px}.search{display:flex;gap:8px;align-items:center}.search input{flex:1;background:white;border:2px solid #e8a0bf;border-radius:25px;padding:14px 18px;font-size:1.15rem;outline:none}.search button{background:#e8a0bf;color:white;border:none;border-radius:25px;padding:14px 20px;font-size:1.3rem;cursor:pointer;font-weight:700}.link-mode{display:flex;gap:8px;align-items:center;background:white;border:2px solid #e8a0bf;border-radius:25px;padding:14px 18px;flex:1}.link-mode input{flex:1;border:none;outline:none;font-size:1rem}.link-mode .go{background:#e8a0bf;color:white;border:none;border-radius:20px;padding:10px 16px;cursor:pointer;font-weight:700}.tabs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;background:#fdf6f0;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{background:white;border:1.5px solid #e8a0bf;border-radius:20px;padding:6px 14px;font-size:0.8rem;white-space:nowrap;cursor:pointer;color:#e8a0bf}.tab.active{background:#e8a0bf;color:white}.list{flex:1;overflow-y:auto;padding:8px 16px 80px}.item{background:white;border-radius:14px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}.item input[type=checkbox]{width:22px;height:22px;accent-color:#e8a0bf;cursor:pointer;flex-shrink:0}.item-img{width:50px;height:50px;object-fit:cover;border-radius:10px;flex-shrink:0;background:#f0f0f0}.item-info{flex:1}.item-info .name{font-weight:700;font-size:1.05rem}.item-info .nom.barre{text-decoration:line-through;color:#aaa}.item-info .meta{font-size:0.78rem;color:#999;margin-top:2px}.item-info .lien{font-size:0.78rem;color:#e8a0bf;word-break:break-all}.badge{font-size:0.7rem;padding:3px 8px;border-radius:10px;background:#f0f5a7;white-space:nowrap}.btn-del{background:none;border:none;color:#ddd;font-size:1.2rem;cursor:pointer;padding:4px}.btn-del:hover{color:#e80}.btn-edit{background:none;border:none;color:#aaa;font-size:1rem;cursor:pointer;padding:4px}.fab{position:fixed;bottom:24px;right:24px;background:#e8a0bf;color:white;border:none;border-radius:50%;width:60px;height:60px;font-size:2rem;cursor:pointer;box-shadow:0 4px 16px rgba(232,160,191,0.5);z-index:100}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;justify-content:center;align-items:flex-end}.overlay.open{display:flex}.modal{display:none;background:white;border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;z-index:201;position:relative}.modal h2{font-size:1.2rem;color:#b05a7a;margin-bottom:16px}label{display:block;font-size:0.8rem;color:#777;margin:10px 0 4px}input,select{width:100%;padding:12px;border:1.5px solid #e8a0bf;border-radius:12px;font-size:1rem}input:focus,select:focus{outline:none;border-color:#b05a7a}.modal-btns{display:flex;gap:8px;margin-top:20px}.btn-cancel{background:#f5f5f5;color:#777;border:none;border-radius:20px;padding:12px 20px;font-size:1rem;cursor:pointer;flex:1}.btn-ok{background:#e8a0bf;color:white;border:none;border-radius:20px;padding:12px 20px;font-size:1rem;cursor:pointer;flex:1;font-weight:700}.cat-item{display:flex;justify-content:space-between;align-items:center;background:white;padding:10px;border-radius:10px;margin-bottom:6px}.cat-item input{width:auto;flex:1;margin-right:10px}.btn-add-cat{background:#e8a0bf;color:white;border:none;border-radius:20px;padding:12px;font-size:1rem;cursor:pointer}.extract-result{background:#f0f8ff;border:1px solid #b0c4de;border-radius:12px;padding:12px;margin-bottom:14px}.extract-result h3{font-size:0.85rem;color:#2c5aa0;margin-bottom:8px}.extract-result p{font-size:0.85rem;color:#333;margin:4px 0}.loading{font-size:0.85rem;color:#e8a0bf;font-style:italic}.extract-img{width:60px;height:60px;object-fit:cover;border-radius:8px;margin-right:10px;float:left}body.dark{background:#1a1a2e;color:#eee}body.dark header{background:linear-gradient(135deg,#b05a7a,#8b405a)}body.dark .search-wrap,body.dark .tabs{background:#1a1a2e}body.dark .search input,body.dark .link-mode{background:#16213e;color:#eee;border-color:#444}body.dark .search button,body.dark .link-mode .go{background:#b05a7a}body.dark .tab{background:#16213e;border-color:#444;color:#aaa}body.dark .tab.active{background:#b05a7a;color:white}body.dark .item{background:#16213e}body.dark .item-info .meta{color:#777}body.dark .modal{background:#1a1a2e}body.dark .modal input,body.dark .modal select,body.dark .cat-item input,body.dark .add-cat input{background:#16213e;color:#eee;border-color:#444}body.dark .btn-cancel{background:#16213e;color:#aaa}body.dark .extract-result{background:#16213e;border-color:#444}body.dark .extract-result h3{color:#e8a0bf}@media(min-width:600px){.overlay{align-items:center}.modal{border-radius:24px}.search-wrap,.tabs,.list{max-width:640px;margin:0 auto}}</style></head><body><header><h1>Bebe 2</h1><div class="header-btns"><button class="hbtn" onclick="toggleTheme()" title="Theme">🌙</button><button class="hbtn" onclick="ouvrirCat()" title="Categories">⚙</button><button class="hbtn" onclick="partager()" title="Partager">📤</button></div></header><div class="search-wrap"><div class="search"><input type="text" id="quickInput" placeholder="Tape et appuie sur Entree..." onkeydown="if(event.key==='Enter')ajouterRapide()"><button onclick="ouvrirModal()" title="Ajout detaille">+</button><button onclick="toggleLinkMode()" title="Ajouter par lien">🔗</button></div><div id="link-mode" class="link-mode" style="display:none;margin-top:8px"><input type="url" id="lienInput" placeholder="Colle le lien du produit (Amazon, Cdiscount...)"><button class="go" onclick="extraireLien()">Go</button><button onclick="toggleLinkMode()">✕</button></div><div id="extract-result" style="display:none"></div></div><div id="tabs" class="tabs"></div><div id="liste" class="list"><p style="text-align:center;color:#999;padding:20px">Tape un nom et appuie sur Entree pour ajouter rapidement !</p></div><button class="fab" onclick="ouvrirModal()">+</button><div class="overlay" id="overlay" onclick="fermerModal()"></div><div class="modal" id="modal-ajout" onclick="event.stopPropagation()"><h2>Ajout rapide</h2><label>Nom</label><input type="text" id="mNom" placeholder="Article..."><label>Categorie</label><select id="mCat"></select><label>Lien produit</label><input type="url" id="mLien" placeholder="URL..."><label>Prix</label><input type="text" id="mPrix" placeholder="ex: 49€"><label>Note</label><input type="text" id="mNote" placeholder="ex: taille 3 mois"><div class="modal-btns"><button class="btn-cancel" onclick="fermerModal()">Annuler</button><button class="btn-ok" onclick="ajoutDetail()">Ajouter ✓</button></div></div><div class="modal" id="modal-edit" onclick="event.stopPropagation()"><h2>Modifier l'article</h2><label>Nom</label><input type="text" id="eNom" placeholder="Article..."><label>Categorie</label><select id="eCat"></select><label>Lien produit</label><input type="url" id="eLien" placeholder="URL..."><label>Prix</label><input type="text" id="ePrix" placeholder="ex: 49€"><label>Note</label><input type="text" id="eNote" placeholder="ex: taille 3 mois"><div class="modal-btns"><button class="btn-cancel" onclick="fermerModal()">Annuler</button><button class="btn-ok" onclick="sauvegarderModif()">Enregistrer ✓</button></div></div><div class="modal" id="modal-cat" onclick="event.stopPropagation()"><h2>Gestion des categories</h2><div id="cat-list"></div><div class="add-cat" style="display:flex;gap:8px;margin-top:12px"><input type="text" id="newCat" placeholder="Nouvelle categorie..."><button class="btn-add-cat" onclick="ajouterCategorie()">+</button></div><div class="modal-btns"><button class="btn-ok" onclick="fermerModal()">Fermer</button></div></div></body><script>const $=id=>document.getElementById(id);const db={items:[],cats:[],currentCat:0,editId:null};const catsKey='liste_cats_v2',itemsKey='liste_items_v2';function save(){localStorage.setItem(catsKey,JSON.stringify(db.cats));localStorage.setItem(itemsKey,JSON.stringify(db.items));}function load(){try{db.cats=JSON.parse(localStorage.getItem(catsKey))||['Vêtements','Puériculture','Jeux','Chambre','Hygiène','Repas','Divers'];}catch(e){}try{db.items=JSON.parse(localStorage.getItem(itemsKey))||[];}catch(e){}}function renderCats(){const ct=$('tabs');ct.innerHTML='';db.cats.forEach((c,i)=>{const btn=document.createElement('button');btn.className='tab'+(i===db.currentCat?' active':'');btn.textContent=c;btn.onclick=()=>{db.currentCat=i;renderTabs();renderList();};ct.appendChild(btn);});const mCat=$('mCat');const eCat=$('eCat');if(mCat){mCat.innerHTML='';db.cats.forEach(c=>{const opt=document.createElement('option');opt.value=c;opt.textContent=c;mCat.appendChild(opt);});}if(eCat){eCat.innerHTML='';db.cats.forEach(c=>{const opt=document.createElement('option');opt.value=c;opt.textContent=c;eCat.appendChild(opt);});}}}function renderList(){const list=$('liste');if(!list)return;list.innerHTML='';const c=db.cats[db.currentCat];const items=db.items.filter(it=>it.cat===c);if(items.length===0){list.innerHTML='<p style="text-align:center;color:#999;padding:20px">Aucun article dans cette categorie. Tape un nom et appuie sur Entree !</p>';return;}items.forEach(it=>{const div=document.createElement('div');div.className='item';const ck=document.createElement('input');ck.type='checkbox';ck.checked=it.done;ck.onchange=()=>{it.done=ck.checked;save();renderList();};div.appendChild(ck);if(it.img){const img=document.createElement('img');img.className='item-img';img.src=it.img;img.alt=it.name;img.onerror=function(){this.style.display='none';};div.appendChild(img);}const info=document.createElement('div');info.className='item-info';const title=document.createElement('div');title.className='name'+(it.done?' barre':'');title.textContent=it.name;info.appendChild(title);if(it.img){const badge=document.createElement('span');badge.className='badge';badge.textContent='Image';info.appendChild(badge);}if(it.url){const urlEl=document.createElement('a');urlEl.className='lien';urlEl.href=it.url;urlEl.textContent=it.url.length>40?it.url.substring(0,37)+'...':it.url;urlEl.target='_blank';info.appendChild(urlEl);}const meta=document.createElement('div');meta.className='meta';const parts=[];if(it.prix)parts.push('Prix: '+it.prix);if(it.note)parts.push(it.note);if(parts.length>0)meta.textContent=parts.join(' | ');info.appendChild(meta);div.appendChild(info);const del=document.createElement('button');del.className='btn-del';del.textContent='✕';del.onclick=()=>{db.items=db.items.filter(x=>x.id!==it.id);save();renderList();renderCats();};div.appendChild(del);const edit=document.createElement('button');edit.className='btn-edit';edit.textContent='✏';edit.onclick=()=>{ouvrirEdit(it);};div.appendChild(edit);list.appendChild(div);});}function renderTabs(){renderCats();}function ajouterRapide(){const input=$('quickInput');const name=input.value.trim();if(!name)return;const item={id:Date.now(),name:name,cat:db.cats[db.currentCat],url:'',prix:'',note:'',img:'',done:false};db.items.unshift(item);save();renderList();renderCats();input.value='';input.focus();}function ouvrirModal(){const m=$('modal-ajout');if(m)m.style.display='block';const ov=$('overlay');if(ov)ov.classList.add('open');const mCat=$('mCat');if(mCat)renderCats();}function fermerModal(){const m=$('modal-ajout');if(m)m.style.display='none';const m2=$('modal-edit');if(m2)m2.style.display='none';const m3=$('modal-cat');if(m3)m3.style.display='none';const ov=$('overlay');if(ov)ov.classList.remove('open');}function ajoutDetail(){const name=$('mNom')?.value.trim();if(!name){alert('Entrez un nom');return;}const cat=$('mCat')?.value||db.cats[0];const url=$('mLien')?.value.trim()||'';const prix=$('mPrix')?.value.trim()||'';const note=$('mNote')?.value.trim()||'';const item={id:Date.now(),name:name,cat:cat,url:url,prix:prix,note:note,img:'',done:false};db.items.unshift(item);save();renderList();renderCats();fermerModal();$('mNom').value='';$('mLien').value='';$('mPrix').value='';$('mNote').value='';}function ouvrirEdit(item){db.editId=item.id;const m=$('modal-edit');if(m)m.style.display='block';const ov=$('overlay');if(ov)ov.classList.add('open');const eNom=$('eNom');const eCat=$('eCat');const eLien=$('eLien');const ePrix=$('ePrix');const eNote=$('eNote');if(eNom)eNom.value=item.name;if(eCat){renderCats();eCat.value=item.cat;}if(eLien)eLien.value=item.url||'';if(ePrix)ePrix.value=item.prix||'';if(eNote)eNote.value=item.note||'';}function sauvegarderModif(){const item=db.items.find(x=>x.id===db.editId);if(!item)return;item.name=$('eNom')?.value.trim()||item.name;item.cat=$('eCat')?.value||item.cat;item.url=$('eLien')?.value.trim()||'';item.prix=$('ePrix')?.value.trim()||'';item.note=$('eNote')?.value.trim()||'';save();renderList();renderCats();fermerModal();}function toggleLinkMode(){const lm=$('link-mode');const er=$('extract-result');if(lm)lm.style.display=lm.style.display==='none'?'flex':'none';if(er)er.style.display='none';}function extraireLien(){const url=$('lienInput')?.value.trim();if(!url){alert('Entrez un lien');return;}const er=$('extract-result');if(er)er.style.display='block';er.innerHTML='<p class="loading">Extraction en cours...</p>';fetch(url).then(r=>{if(!r.ok)throw new Error('URL invalide');return r.text();}).then(html=>{const parser=new DOMParser();const doc=parser.parseFromString(html,'text/html');const title=doc.querySelector('title')?.textContent?.trim()||'Produit';const metaTitle=doc.querySelector('meta[property="og:title"]')?.getAttribute('content')||title;const imgUrl=doc.querySelector('meta[property="og:image"]')?.getAttribute('content')||doc.querySelector('img[src*="product"]')?.src||'';const metaDesc=doc.querySelector('meta[name="description"]')?.getAttribute('content')||'';let prix='';const priceMatch=html.match(/[0-9]+[.,][0-9]{2}[€$]/);if(priceMatch)prix=priceMatch[0];if(!imgUrl){const allImgs=doc.querySelectorAll('img');for(let img of allImgs){const src=img.getAttribute('src')||img.getAttribute('data-src');if(src&&src.includes('product')){imgUrl=src;break;}}}er.innerHTML='<div class="extract-result"><h3>'+metaTitle+'</h3>'+(metaDesc?'<p>'+metaDesc+'</p>':'')+(prix?'<p>Prix: '+prix+'</p>':'')+(imgUrl?'<img src="'+imgUrl+'" class="extract-img" alt="product">':'')+'</div>';$('mNom').value=metaTitle;if(imgUrl)alert('Image trouvée! Cliquez sur + pour ajouter manuellement');}).catch(e=>{er.innerHTML='<p style="color:red">Erreur: URL inaccessible. Vérifiez le lien.</p>';});}function ouvrirCat(){const m=$('modal-cat');if(m)m.style.display='block';const ov=$('overlay');if(ov)ov.classList.add('open');renderCatList();}function renderCatList(){const cl=$('cat-list');if(!cl)return;cl.innerHTML='';db.cats.forEach(c=>{const div=document.createElement('div');div.className='cat-item';const inp=document.createElement('input');inp.type='text';inp.value=c;inp.onchange=function(){const idx=db.cats.indexOf(c);db.cats[idx]=this.value;save();renderCats();renderList();};const del=document.createElement('button');del.textContent='✕';del.onclick=()=>{db.cats=db.cats.filter(x=>x!==c);db.items=db.items.filter(i=>i.cat!==c);save();renderCats();renderList();renderCatList();};div.appendChild(inp);div.appendChild(del);cl.appendChild(div);});}function ajouterCategorie(){const inp=$('newCat');const name=inp.value.trim();if(!name)return;db.cats.push(name);save();renderCats();renderCatList();inp.value='';}function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');}function partager(){if(navigator.share){navigator.share({title:'Liste Naissance Bebe 2',url:window.location.href}).catch(e=>{});}else{alert('Partage non supporté. Lien: '+window.location.href);}}window.addEventListener('load',function(){load();if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');renderCats();renderList();if('serviceWorker'in navigator){navigator.serviceWorker.register('/liste-naissance-bebe2/sw.js').catch(e=>console.log('SW:',e));}});</script></html>
